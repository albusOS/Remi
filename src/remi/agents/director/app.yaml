apiVersion: remi/v1
kind: Agent

metadata:
  name: director
  version: "6.0.0"
  description: >
    REMI — AI workforce member for real estate portfolio intelligence.
    Fast Q&A mode: answers quickly using structured data queries and signal awareness.
    For deep autonomous analysis, use the researcher agent.
  tags: [analyst, analytics, signals]
  domain: real-estate
  audience: director
  chat: true
  primary: true

modules:
  - id: director
    kind: agent
    description: >
      Fast Q&A analyst. Answers quickly using structured data queries and
      signal awareness. For deep autonomous investigation, use Research mode.
    config:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.3
      max_tokens: 4096
      max_iterations: 5

      system_prompt: |
        You are REMI, a fast and direct AI analyst for a real estate portfolio
        director. You answer questions quickly using structured data.

        You have access to data query tools, signal tools, and workflow tools.
        Their descriptions are in the tool definitions. Prefer workflow tools
        (portfolio_review, delinquency_review, lease_risk_review) — they
        bundle multiple queries into a single call.

        ## How you work

        1. Check signals first — they tell you what the system already knows.
           Name signals explicitly by their domain signal name. Use causal
           chains to connect related signals. Reference policies when
           recommending actions.
        2. Query structured data to ground your answer in specific numbers.
        3. Be direct and concise. Cite specific values. Name entities.
        4. If you don't have enough data, say so and suggest what would help.

        ## Rules

        - Every claim must be grounded in data you retrieved.
        - Be direct about problems — the director needs truth, not diplomacy.
        - Keep answers focused — this is Q&A, not a report.
        - If a question needs deeper analysis, say so and suggest using
          Research mode.

      input_template: "{input}"
      output_contract: conversation
      response_format: text

      tools:
        - name: portfolio_review
        - name: delinquency_review
        - name: lease_risk_review
        - name: draft_action_plan
        - name: approve_action_plan
        - name: onto_signals
        - name: onto_explain
        - name: onto_search
        - name: onto_aggregate
        - name: document_query
        - name: semantic_search

      intents:
        conversation:
          description: "General conversation, clarification, or greeting"
          keywords: [hi, hello, hey, thanks, thank you, bye, what can you do]
          tools: []
          max_tool_rounds: 0
          max_iterations: 1
          context_injection: []

        lookup:
          description: "Quick data lookup — vacancy, delinquency, unit count, etc."
          keywords: [how many, show me, what is, list, get, count]
          tools: [onto_search, onto_aggregate, onto_signals, semantic_search]
          max_tool_rounds: 1
          max_iterations: 4
          context_injection: [signals]

        analysis:
          description: "Multi-step analysis requiring data gathering and synthesis"
          keywords: [compare, analyze, rank, breakdown, summarize, overview, review, assess]
          tools: [portfolio_review, delinquency_review, lease_risk_review,
                  onto_signals, onto_search, onto_aggregate, semantic_search,
                  onto_explain, document_query]
          max_tool_rounds: 3
          max_iterations: 6
          context_injection: [signals, domain]

        action:
          description: "Creating or managing action items and plans"
          keywords: [create action, draft plan, action plan, action item, approve plan]
          tools: [draft_action_plan, approve_action_plan, portfolio_review,
                  onto_signals, onto_search, onto_aggregate, document_query]
          max_tool_rounds: 4
          max_iterations: 8
          context_injection: [signals]

      memory:
        namespace: remi-director
        auto_load: true
        auto_save: true
