apiVersion: remi/v1
kind: DomainSchema

# =============================================================================
# Domain Schema — the vocabulary of this business
#
# What entity types exist, how they relate, and what business processes
# the product covers.  This is structural knowledge — the skeleton the
# agent uses to understand the world it operates in.
#
# The agent discovers patterns, calculates metrics, and identifies what
# matters from the actual data.  This file tells it what kinds of things
# exist and how they connect — not what to look for.
# =============================================================================

schema:

  # ---------------------------------------------------------------------------
  # Entity types — the nouns of the domain
  # ---------------------------------------------------------------------------

  entity_types:

    - name: PropertyManager
      description: >
        A person or company responsible for operating a portfolio of
        rental properties on behalf of owners.
      key_fields: [name, email, phone]

    - name: Property
      description: >
        A physical real estate asset — an address with one or more
        rentable units managed by a property manager.
      key_fields: [name, address, city, state]

    - name: Unit
      description: >
        A single rentable space within a property — an apartment,
        suite, or house.
      key_fields: [unit_number, bedrooms, bathrooms, rent_amount]

    - name: Lease
      description: >
        A rental agreement between a tenant and a property for a
        specific unit, with defined terms and rent.
      key_fields: [start_date, end_date, monthly_rent, status]

    - name: Tenant
      description: >
        A person or entity who rents a unit under a lease agreement.
      key_fields: [name, email, phone, status]

    - name: MaintenanceRequest
      description: >
        A work order for repair or upkeep on a unit or property,
        tracked from request through completion.
      key_fields: [description, status, priority, created_date]

    - name: Owner
      description: >
        The person or entity that owns a property and employs a
        manager to operate it.
      key_fields: [name]

    - name: Vendor
      description: >
        A contractor or service provider who performs maintenance,
        repairs, or make-ready work.
      key_fields: [name, trade]

  # ---------------------------------------------------------------------------
  # Relationships — how entity types connect
  # ---------------------------------------------------------------------------

  relationships:

    - name: MANAGES
      source: PropertyManager
      target: Property
      description: A manager operates a property on behalf of its owner

    - name: OWNS
      source: Owner
      target: Property
      description: An owner holds title to a property

    - name: HAS_UNIT
      source: Property
      target: Unit
      description: A property contains one or more rentable units

    - name: HAS_LEASE
      source: Unit
      target: Lease
      description: A unit may have an active lease agreement

    - name: TENANT_ON
      source: Tenant
      target: Lease
      description: A tenant is party to a lease agreement

    - name: FOR_UNIT
      source: MaintenanceRequest
      target: Unit
      description: A maintenance request is for work on a specific unit

    - name: ASSIGNED_TO
      source: MaintenanceRequest
      target: Vendor
      description: A maintenance request is assigned to a vendor

  # ---------------------------------------------------------------------------
  # Business processes — the verbs of the domain
  # ---------------------------------------------------------------------------

  processes:

    - name: collections
      description: >
        The lifecycle of rent collection — from due date through grace
        period, late notices, demand letters, and potential legal action.
      involves: [Lease, Tenant, PropertyManager, Owner]

    - name: leasing
      description: >
        The lifecycle of lease management — renewals, pricing, expirations,
        new tenant screening, and move-in/move-out coordination.
      involves: [Lease, Tenant, Unit, Property, PropertyManager]

    - name: maintenance
      description: >
        The lifecycle of property upkeep — requests, triage, vendor
        dispatch, work execution, inspection, and close-out.
      involves: [MaintenanceRequest, Unit, Property, Vendor, Tenant, PropertyManager]

    - name: turnover
      description: >
        The unit turnover lifecycle — from lease expiration through
        move-out, make-ready, listing, and new lease signing.
      involves: [Unit, Lease, Tenant, Property, PropertyManager, Vendor]

    - name: performance
      description: >
        Ongoing monitoring of portfolio health — occupancy, rent
        collection rates, maintenance responsiveness, and manager
        effectiveness relative to peers.
      involves: [PropertyManager, Property, Unit]
