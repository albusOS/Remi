apiVersion: remi/v1
kind: Workflow

metadata:
  name: document-ingestion
  version: "5.0.0"
  description: >
    Full ingestion workflow: LLM extract → map → validate → persist.

    The LLM sees metadata, column headers, and sample rows — returns a
    column_map and entity type. Python transforms apply the map, validate
    rows, and persist entities. The capture step runs only when the LLM
    flags observations_likely.

    Step 1 (extract): fast model, column mapping via ontology.
    Step 2 (should_capture): gate on observations_likely.
    Step 3 (capture): gated LLM, structures novel rows as KG entries.
    Step 4 (map_rows): transform, apply_column_map to all rows.
    Step 5 (validate_rows): transform, check required fields.
    Step 6 (persist): for_each, persist each validated row.

  tags: [ingestion, extraction, internal]
  domain: real-estate
  audience: system
  chat: false

steps:
  # ---------------------------------------------------------------------------
  # Step 1 — Extract
  # ---------------------------------------------------------------------------
  - id: extract
    kind: llm
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 4096
    response_format: json
    output_schema: ExtractResult
    retry:
      max_attempts: 3
      backoff: exponential
      base_delay: 2.0
    system_prompt: |
      You are a real-estate data extraction agent.

      DOMAIN ONTOLOGY — the entity types the system knows and their canonical fields:
      {context.entity_schemas}

      You receive three things:
        - metadata: key-value pairs from the report header rows. AppFolio reports
          always include a title like "Ryan Steen Rent Roll" and lines like
          "Property Groups: Ryan Steen Mgmt" and "Exported On: 03/23/2026".
          USE THIS — it tells you the manager, the report type, and the date.
        - column_names: raw header columns from the data table
        - sample_rows: up to 5 data rows for orientation

      YOUR JOB IS COLUMN MAPPING ONLY. Produce these fields:

      1. report_type: snake_case label for the report. Derive from
         metadata.report_title first (e.g. "Ryan Steen Rent Roll" → "rent_roll"),
         fall back to column pattern inference. Common values: "rent_roll",
         "delinquency", "lease_expiration", "maintenance", "property_directory".

      2. platform: source system from metadata if present. Default "appfolio".

      3. manager: manager name extracted from metadata.property_groups or
         metadata.report_title (e.g. "Ryan Steen"). Null if not identifiable.

      4. scope: what slice of the portfolio this report covers. One of:
           "portfolio_wide"    — all properties, no manager/property filter
           "manager_portfolio" — one manager's full book (most common)
           "single_property"   — report header names a single property address
           "single_unit"       — report header names a specific unit
           "unknown"           — cannot determine from metadata

      5. effective_date: the export/run date as "YYYY-MM-DD" if visible in
         metadata (e.g. "Exported On: 03/23/2026" → "2026-03-23"). Null otherwise.

      6. date_range_start / date_range_end: the start and end of the DATA the
         report covers, as "YYYY-MM-DD". Distinct from effective_date (which is
         when it was exported). Null when the report is a point-in-time snapshot.

      8. primary_entity_type: the ontology entity whose fields best match the
         column headers. Examples:
           - Rent roll / occupancy reports → "Unit"
           - Delinquency / balance / aging reports → "BalanceObservation"
           - Lease expiration reports → "Lease"
           - Work orders / maintenance → "MaintenanceRequest"
           - Property directory → "PropertyManager"
           - Owner directory → "Owner"
           - Vendor directory → "Vendor"

      9. column_map: dict mapping every meaningful raw column header to the
         canonical snake_case field from the ontology.

         Conventions:
           - Property/address columns → "property_address"
           - Unit/apt identifier → "unit_number"
           - Person name → "tenant_name" or "name" depending on entity type
           - Site manager name in directories → "name"
           - Combined "Beds/Baths" or "BD/BA" → "_bd_ba" (auto-split by Python)
           - Columns with no ontology match → prefix with "_" (stored as extra_fields)

         For property directory reports (primary_entity_type: "PropertyManager"):
           - Map the property/address column → "property_address"
           - Map the manager/site manager column → "name"
           - Map units/unit count → "_unit_count"

      10. section_header_column: the raw column name whose value encodes section
          context in hierarchical reports. Usually "Property". Null if flat.

      11. observations_likely: true when the document type has no strong match,
          >30% columns map to "_*", or the data is a new concept. False only
          when the document is cleanly one entity type with strong coverage.

      12. unknown_columns: list of raw column headers mapped to "_*" that contain
          meaningful data the capture step should preserve.

      SKIP pure formatting columns (blank headers, row numbers, page markers).

      RESPOND ONLY WITH VALID JSON matching this shape:
      {
        "report_type": "rent_roll",
        "platform": "appfolio",
        "manager": "Ryan Steen",
        "scope": "manager_portfolio",
        "effective_date": "2026-03-23",
        "date_range_start": null,
        "date_range_end": null,
        "primary_entity_type": "Unit",
        "column_map": {
          "Property": "property_address",
          "Unit": "unit_number",
          "BD/BA": "_bd_ba",
          "Sq Ft": "sqft",
          "Lease From": "start_date",
          "Lease To": "end_date",
          "Rent": "monthly_rent",
          "Market Rent": "market_rent",
          "Status": "_occupancy_section",
          "Days Vacant": "_days_vacant"
        },
        "section_header_column": "Property",
        "observations_likely": false,
        "unknown_columns": ["Status", "Days Vacant"]
      }

    input_template: |
      {input}

  # ---------------------------------------------------------------------------
  # Step 2 — Gate: should we run capture?
  # ---------------------------------------------------------------------------
  - id: should_capture
    kind: gate
    condition: steps.extract.observations_likely
    depends_on: [extract]

  # ---------------------------------------------------------------------------
  # Step 3 — Capture (gated — only when observations_likely=true)
  # ---------------------------------------------------------------------------
  - id: capture
    kind: llm
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 8192
    response_format: json
    output_schema: CaptureResult
    depends_on: [should_capture]
    system_prompt: |
      You are a real-estate knowledge graph enrichment agent.

      DOMAIN ONTOLOGY — known entity types:
      {context.entity_schemas}

      You receive rows from a document that either (a) don't fit any known entity
      type, or (b) come from a report type not yet in the ontology.

      Your job: create KG entries that preserve everything meaningful.
      This is how the ontology grows — don't discard novel data.

      For each row (or group of related rows), produce:

      1. entity_type: descriptive PascalCase for this concept. If the whole document
         is a new type (e.g. "InspectionLog", "InsuranceCertificate"), use that.
         Use "noise" only for truly blank/junk rows.

      2. entity_id: stable slug — "<lowercase_type>:<key_fields_slugified>"

      3. properties: ALL fields from the row including unknown_columns.
         Preserve everything — the system can reason over it later.

      4. relationships: link to known entities using UPPER_SNAKE_CASE relation types
         (AT_PROPERTY, AFFECTS, REPORTED_BY, SERVICED_BY).

      RESPOND ONLY WITH VALID JSON:
      {
        "captured": [
          {
            "entity_type": "InspectionRecord",
            "entity_id": "inspection_record:123-main-st:apt-2:2026-03-01",
            "properties": {
              "property_address": "123 Main St",
              "unit_number": "Apt 2",
              "inspector": "Mike Jones",
              "score": 87,
              "date": "2026-03-01"
            },
            "relationships": [
              {
                "source_id": "inspection_record:123-main-st:apt-2:2026-03-01",
                "target_id": "property:123-main-st",
                "relation_type": "AT_PROPERTY"
              }
            ]
          }
        ]
      }

    input_template: |
      Extraction context (report_type, primary_entity_type, unknown_columns):
      {steps.extract}

      Raw rows to capture as knowledge graph entries:
      {input}

  # ---------------------------------------------------------------------------
  # Step 4 — Map rows (transform, parallel with capture)
  # ---------------------------------------------------------------------------
  - id: map_rows
    kind: transform
    tool: apply_column_map
    depends_on: [extract]

  # ---------------------------------------------------------------------------
  # Step 5 — Validate rows
  # ---------------------------------------------------------------------------
  - id: validate_rows
    kind: transform
    tool: validate_rows
    depends_on: [map_rows]

  # ---------------------------------------------------------------------------
  # Step 6 — Persist each row
  # ---------------------------------------------------------------------------
  - id: persist
    kind: for_each
    tool: persist_row
    items_from: steps.validate_rows.accepted
    concurrency: 1
    on_error: collect
    depends_on: [validate_rows]

wires:
  - source: extract.column_map
    target: map_rows.column_map
  - source: extract.primary_entity_type
    target: map_rows.entity_type
  - source: extract.section_header_column
    target: map_rows.section_header_column
  - source: map_rows.rows
    target: validate_rows.rows
