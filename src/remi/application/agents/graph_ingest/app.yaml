apiVersion: remi/v1
kind: Workflow

metadata:
  name: graph-ingest
  version: "2.0.0"
  description: >
    Graph-reasoning ingestion pipeline. The LLM reasons about the document
    against the current knowledge graph, producing graph operations (upsert,
    link, extend, review) that Python executes atomically.

    Handles everything the column-map pipeline cannot:
      - Entity identity resolution
      - Cross-document relationship inference
      - Novel concept detection and schema extension proposals
      - Documents that mix multiple entity types

    Use when algorithmic matcher confidence is low or when
    observations_likely was flagged by the extract step.

  tags: [ingestion, graph, reasoning, internal]
  domain: real-estate
  audience: system
  chat: false

steps:
  # ---------------------------------------------------------------------------
  # Step 1 — Reason
  # ---------------------------------------------------------------------------
  - id: reason
    kind: llm
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 8192
    response_format: json
    output_schema: GraphReasonResult
    retry:
      max_attempts: 2
      backoff: exponential
      base_delay: 2.0
    system_prompt: |
      You are a real estate knowledge graph reasoning agent.

      DOMAIN ONTOLOGY — entity types and their canonical fields:
      {context.entity_schemas}

      EXISTING GRAPH — entities already in the system that this document
      may reference or extend:
      {context.graph_context}

      You receive a document payload:
        - metadata: report header info (title, property group, date, platform)
        - column_names: raw column headers
        - sample_rows: up to 10 representative rows
        - total_rows: total row count

      YOUR JOB: Produce graph operations that represent what this document
      means for the knowledge graph.

      REASONING APPROACH:

      1. IDENTIFY what real-world concepts this document contains.

      2. RESOLVE identities against the existing graph.
         - Exact match after normalization → always merge
         - Clearly the same with minor variation → merge, note it
         - Ambiguous → create with confidence field and flag for review

      3. PRODUCE graph operations. Each operation is one of:
           upsert:   create or update an entity
           link:     assert a relationship between two entities
           extend:   propose a new entity type not in the ontology
           review:   flag something that needs human confirmation

      4. For KNOWN entity types — map all meaningful fields using the
         ontology field names exactly.

      5. For UNKNOWN concepts — use "extend" to propose a new type.

      6. RELATIONSHIPS — infer from context:
           - A lease links a Unit to a Tenant → LEASED_BY
           - A maintenance request is at a unit → AT_UNIT, AT_PROPERTY
           - A balance observation is for a tenant → OWES, FOR_LEASE
           - A property is managed by a manager → MANAGED_BY

      ENTITY ID CONVENTION: use existing graph IDs for known entities,
      generate slug IDs for new ones: "<type_lower>:<normalized_key_fields>".

      RESPOND ONLY WITH VALID JSON:
      {
        "report_type": "rent_roll",
        "platform": "appfolio",
        "manager": "Ryan Steen",
        "total_entities": 47,
        "operations": [
          {
            "op": "upsert",
            "type": "Property",
            "id": "property:123-main-st-pittsburgh-pa",
            "properties": {
              "address": "123 Main St, Pittsburgh, PA 15203",
              "name": "123 Main St"
            },
            "identity_note": null
          },
          {
            "op": "link",
            "source_id": "property:123-main-st-pittsburgh-pa",
            "target_id": "manager:ryan-steen",
            "relation": "MANAGED_BY",
            "properties": {}
          },
          {
            "op": "extend",
            "proposed_type": "RecurringServiceContract",
            "description": "A recurring vendor service agreement at a property",
            "fields": ["vendor", "service_type", "frequency", "monthly_cost"],
            "sample": {"vendor": "Ehrlich", "service_type": "pest_control"}
          },
          {
            "op": "review",
            "reason": "Manager name may match existing entity (score 0.81)",
            "input_value": "R. Steen Mgmt",
            "candidate_id": "manager:ryan-steen",
            "confidence": 0.81
          }
        ]
      }

    input_template: |
      {input}

  # ---------------------------------------------------------------------------
  # Step 2 — Execute graph operations
  # ---------------------------------------------------------------------------
  - id: execute_ops
    kind: for_each
    tool: apply_graph_operation
    items_from: steps.reason.operations
    concurrency: 1
    on_error: collect
    depends_on: [reason]

  # ---------------------------------------------------------------------------
  # Step 3 — Extend (conditional — only when extend operations exist)
  # ---------------------------------------------------------------------------
  - id: has_extensions
    kind: gate
    condition: steps.reason.operations
    depends_on: [reason]

  - id: extend
    kind: llm
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    response_format: json
    output_schema: GraphExtendResult
    depends_on: [has_extensions]
    system_prompt: |
      You are a real estate ontology design agent.

      DOMAIN ONTOLOGY — existing entity types:
      {context.entity_schemas}

      You receive proposed new entity types from the reasoning step.
      Your job: for each proposed type, design a full schema that fits
      naturally into the existing ontology.

      For each proposed type, produce:
      1. type_name: PascalCase, descriptive
      2. description: one sentence, domain-specific
      3. fields: list of {name, type, required, description}
      4. relationships: list of {relation, target_type, direction, description}
      5. reasoning: why this is a genuinely new type vs. an existing one

      RESPOND ONLY WITH VALID JSON:
      {
        "proposed_types": [
          {
            "type_name": "RecurringServiceContract",
            "description": "A standing vendor agreement for recurring services",
            "fields": [
              {"name": "id", "type": "str", "required": true, "description": "Stable slug ID"},
              {"name": "property_id", "type": "str", "required": true, "description": "FK to Property"},
              {"name": "vendor", "type": "str", "required": true, "description": "Vendor name"}
            ],
            "relationships": [
              {"relation": "AT_PROPERTY", "target_type": "Property", "direction": "outbound"}
            ],
            "reasoning": "Not a MaintenanceRequest or Vendor — this is the agreement itself."
          }
        ]
      }

    input_template: |
      Reasoning result:
      {steps.reason}
