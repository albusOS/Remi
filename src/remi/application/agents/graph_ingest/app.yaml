apiVersion: remi/v1
kind: Pipeline

metadata:
  name: graph-ingest
  version: "1.0.0"
  description: >
    Graph-reasoning ingestion pipeline. Instead of mapping column headers to
    a fixed schema, the LLM reasons about the document as a whole against the
    current knowledge graph — producing graph operations (upsert, link, extend)
    that Python executes atomically.

    This handles everything the column-map pipeline cannot:
      - Entity identity resolution ("Ryan Steen Mgmt" = existing "Ryan Steen")
      - Cross-document relationship inference
      - Novel concept detection and schema extension proposals
      - Documents that mix multiple entity types

    Use this pipeline when the algorithmic matcher confidence is low (< 0.5)
    or when observations_likely was flagged by the extract step.

  tags: [ingestion, graph, reasoning, internal]
  domain: real-estate
  audience: system
  chat: false

steps:
  # ---------------------------------------------------------------------------
  # Step 1 — Reason
  #
  # The LLM sees: domain ontology + existing graph context + document content.
  # It produces graph operations, not a column map.
  # One call per document. Uses a capable model because it's reasoning, not
  # just pattern-matching.
  # ---------------------------------------------------------------------------
  - id: reason
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 8192
    response_format: json
    system_prompt: |
      You are a real estate knowledge graph reasoning agent.

      DOMAIN ONTOLOGY — entity types and their canonical fields:
      {context.entity_schemas}

      EXISTING GRAPH — entities already in the system that this document
      may reference or extend:
      {context.graph_context}

      You receive a document payload:
        - metadata: report header info (title, property group, date, platform)
        - column_names: raw column headers
        - sample_rows: up to 10 representative rows
        - total_rows: total row count

      YOUR JOB: Produce graph operations that represent what this document
      means for the knowledge graph.

      REASONING APPROACH:

      1. IDENTIFY what real-world concepts this document contains.
         Think in domain terms: "this is a rent roll — it describes which
         units are occupied, by whom, at what rent, under what lease terms."
         NOT: "column X maps to field Y."

      2. RESOLVE identities against the existing graph.
         - If a property address in the document matches (or nearly matches)
           an existing Property node, USE that node's id — don't create a duplicate.
         - If a manager name is similar to an existing manager, USE the existing
           id and note the alias in the operation.
         - Identity resolution rules:
           * Exact match after normalization → always merge
           * Clearly the same address/name with minor variation → merge, note it
           * Ambiguous → create with a confidence field and flag for review

      3. PRODUCE graph operations. Each operation is one of:
           upsert:   create or update an entity
           link:     assert a relationship between two entities
           extend:   propose a new entity type not in the ontology
           review:   flag something that needs human confirmation

      4. For KNOWN entity types (Unit, Tenant, Lease, BalanceObservation,
         MaintenanceRequest, Property, PropertyManager, etc.) — map all
         meaningful fields using the ontology field names exactly.

      5. For UNKNOWN concepts — use "extend" to propose a new type.
         Include: type name (PascalCase), description, field list, sample values.
         The system will add this to the review queue for promotion.

      6. RELATIONSHIPS — infer them from context:
           - A lease links a Unit to a Tenant → LEASED_BY
           - A maintenance request is at a unit → AT_UNIT, AT_PROPERTY
           - A balance observation is for a tenant → OWES, FOR_LEASE
           - A property is managed by a manager → MANAGED_BY

      ENTITY ID CONVENTION: use the existing graph IDs for known entities,
      generate slug IDs for new ones: "<type_lower>:<normalized_key_fields>".

      RESPOND ONLY WITH VALID JSON:
      {
        "report_type": "rent_roll",
        "platform": "appfolio",
        "manager": "Ryan Steen",
        "total_entities": 47,
        "operations": [
          {
            "op": "upsert",
            "type": "Property",
            "id": "property:123-main-st-pittsburgh-pa",
            "properties": {
              "address": "123 Main St, Pittsburgh, PA 15203",
              "name": "123 Main St"
            },
            "identity_note": null
          },
          {
            "op": "upsert",
            "type": "Unit",
            "id": "unit:property:123-main-st-pittsburgh-pa:apt-2",
            "properties": {
              "property_id": "property:123-main-st-pittsburgh-pa",
              "unit_number": "Apt 2",
              "bedrooms": 2,
              "bathrooms": 1,
              "sqft": 850,
              "market_rent": 1200.00
            },
            "identity_note": null
          },
          {
            "op": "link",
            "source_id": "property:123-main-st-pittsburgh-pa",
            "target_id": "manager:ryan-steen",
            "relation": "MANAGED_BY",
            "properties": {}
          },
          {
            "op": "extend",
            "proposed_type": "RecurringServiceContract",
            "description": "A recurring vendor service agreement at a property",
            "fields": ["vendor", "service_type", "frequency", "monthly_cost", "property_id"],
            "sample": {"vendor": "Ehrlich", "service_type": "pest_control", "frequency": "monthly"}
          },
          {
            "op": "review",
            "reason": "Manager 'R. Steen Mgmt' may be the same as existing 'Ryan Steen' (score 0.81)",
            "input_value": "R. Steen Mgmt",
            "candidate_id": "manager:ryan-steen",
            "confidence": 0.81
          }
        ]
      }

    input_template: |
      metadata: {input.metadata}
      column_names: {input.column_names}
      sample_rows: {input.sample_rows}
      total_rows: {input.total_rows}

  # ---------------------------------------------------------------------------
  # Step 2 — Extend (conditional — only when extend operations exist)
  #
  # For each proposed new type, reason about how it fits into the existing
  # ontology and generate a full schema proposal for human review.
  # ---------------------------------------------------------------------------
  - id: extend
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    response_format: json
    system_prompt: |
      You are a real estate ontology design agent.

      DOMAIN ONTOLOGY — existing entity types:
      {context.entity_schemas}

      You receive proposed new entity types from the reasoning step.
      Your job: for each proposed type, design a full schema that fits
      naturally into the existing ontology.

      For each proposed type, produce:
      1. type_name: PascalCase, descriptive
      2. description: one sentence, domain-specific
      3. fields: list of {name, type, required, description}
         - Use the same type conventions as the ontology (str, Decimal, date, etc.)
         - Include an "id" field (str, required)
         - Include "property_id" if the entity is scoped to a property
         - Include "source_document_id" for provenance
      4. relationships: list of {relation, target_type, direction, description}
      5. reasoning: why this is a genuinely new type vs. an existing one

      RESPOND ONLY WITH VALID JSON:
      {
        "proposed_types": [
          {
            "type_name": "RecurringServiceContract",
            "description": "A standing vendor agreement for recurring services at a property",
            "fields": [
              {"name": "id", "type": "str", "required": true, "description": "Stable slug ID"},
              {"name": "property_id", "type": "str", "required": true, "description": "FK to Property"},
              {"name": "vendor", "type": "str", "required": true, "description": "Vendor name"},
              {"name": "service_type", "type": "str", "required": true, "description": "e.g. pest_control"},
              {"name": "frequency", "type": "str", "required": false, "description": "monthly, quarterly, etc."},
              {"name": "monthly_cost", "type": "Decimal", "required": false},
              {"name": "source_document_id", "type": "str", "required": false}
            ],
            "relationships": [
              {"relation": "AT_PROPERTY", "target_type": "Property", "direction": "outbound"},
              {"relation": "SERVICED_BY", "target_type": "Vendor", "direction": "outbound"}
            ],
            "reasoning": "Not a MaintenanceRequest (those are one-time work orders). Not a Vendor (those are the provider, not the contract). RecurringServiceContract is the agreement itself."
          }
        ]
      }

    input_template: |
      Reasoning result:
      {steps.reason}

      Proposed types to fully specify:
      {input}
