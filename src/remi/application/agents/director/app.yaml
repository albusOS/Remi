apiVersion: remi/v1
kind: Agent

metadata:
  name: director
  version: "10.0.0"
  description: >
    REMI Copilot — the user-facing orchestrator for the AI workforce.
    Reasons about the user's intent, plans multi-step approaches,
    delegates to specialist agents when needed, and has direct access
    to shell, HTTP, and the full data platform.
  tags: [orchestrator, copilot, analyst]
  domain: real-estate
  audience: user
  chat: true
  primary: true

modules:
  - id: director
    kind: agent
    description: >
      Orchestrator copilot that reasons about what the user needs, plans
      its approach, and executes using the right combination of tools
      and specialist agents.
    config:
      provider: anthropic
      model: claude-sonnet-4-20250514
      tool_routing_provider: anthropic
      tool_routing_model: claude-haiku-4-5-20251001
      temperature: 0.3
      max_tokens: 8192
      max_iterations: 16
      compact_tbox: true

      system_prompt: |
        You are REMI, the AI copilot for real estate operations management.

        ## How you work

        1. **Understand** — What does the user need? If ambiguous, ask.
        2. **Execute** — Use the right tool for the job (see below).
        3. **Synthesize** — Connect findings into actionable insight.
           Don't dump raw data — interpret it.
        4. **Lead** — Surface problems the user didn't ask about.

        ## Tool selection

        **Single-manager deep-dive — workflow tools (one call, rich JSON):**
        - `manager_review(manager_name="Jake Kraus")` — full overview with properties, delinquency, vacancies, expirations
        - `delinquency_review(manager_name?)` — delinquent tenant detail
        - `lease_risk_review(manager_name?, days?)` — lease expirations + vacancy tracker
        All workflow tools accept `manager_name` (resolved automatically) or `manager_id`.
        When the user mentions a manager by name, pass `manager_name` directly — no search step needed.
        Never call these in a loop — one manager per call.

        **Multi-entity questions — Python sandbox (code-first):**
        - `sandbox_exec_python` — write Python against `import remi_data`
        - Sandbox has pandas, numpy, scipy, statsmodels, sklearn
        - `remi_data` functions (all accept `as_df=True`):
          `managers()`, `manager_rankings(sort_by, ascending, limit)`,
          `manager_review(manager_id)`, `dashboard_overview(manager_id=None)`,
          `properties()`, `units()`, `leases()`, `leases_expiring(days=60)`,
          `maintenance()`, `signals()`, `dashboard_delinquency(manager_id=None)`,
          `dashboard_vacancies(manager_id=None)`, `rent_roll(property_id)`,
          `search(query, types=None, manager_id=None, limit=10)`
        - MUST use sandbox for: comparisons, rankings, cross-entity, multi-entity

        **Entity lookup:** `entity_search` — fast hybrid search by name/address

        **Mutations:** `http_request` — POST to create action items, notes, trigger inference

        **Deep research:** `delegate_to_agent("researcher", task)` — statistical analysis, reports

        ## Workspace (multi-turn tasks only)

        Sandbox files persist across turns. For complex multi-step work:
        - Write **PLAN.md** with your approach; update as steps complete
        - **CONTEXT.md** is auto-maintained with trimmed conversation summaries

        ## Rules

        - Every claim must cite specific data you retrieved
        - Never say "I don't have access" — you have the full platform
        - Be direct about problems — truth over diplomacy
        - For simple questions be concise; for complex ones be thorough
        - When code fails, read the error, fix it, retry

      input_template: "{input}"
      output_contract: conversation
      response_format: text

      tools:
        # Workflow tools
        - name: manager_review
        - name: delinquency_review
        - name: lease_risk_review
        # Sandbox
        - name: sandbox_exec_python
        - name: sandbox_write_file
        - name: sandbox_read_file
        - name: sandbox_list_files
        - name: sandbox_exec
        # HTTP + delegation
        - name: http_request
        - name: delegate_to_agent
        # Workflow actions
        - name: draft_action_plan
        - name: approve_action_plan
        # Search
        - name: entity_search
        # Knowledge base
        - name: onto_signals
        - name: onto_explain
        - name: onto_search
        - name: onto_aggregate
        - name: document_list
        - name: document_query
        - name: document_search
        - name: semantic_search
        # Memory
        - name: memory_store
        - name: memory_recall

      intents:
        conversation:
          description: "General conversation, clarification, or greeting"
          keywords: [hi, hello, hey, thanks, thank you, bye, what can you do]
          tools: []
          max_tool_rounds: 0
          max_iterations: 2
          context_injection: []

        lookup:
          description: "Simple entity lookup or single-manager question"
          keywords: []
          tools:
            - manager_review
            - delinquency_review
            - lease_risk_review
            - entity_search
            - sandbox_exec_python
            - onto_search
          max_tool_rounds: 3
          max_iterations: 6
          context_injection: [signals]

        analysis:
          description: "Multi-step analysis, comparison, reporting, or action"
          keywords:
            - compare
            - analyze
            - analysis
            - rank
            - breakdown
            - summarize
            - overview
            - assess
            - evaluate
            - review
            - underperforming
            - top
            - worst
            - best
            - audit
            - report
            - trend
            - export
            - investigate
            - comprehensive
            - detailed analysis
          tools:
            - manager_review
            - delinquency_review
            - lease_risk_review
            - sandbox_exec_python
            - sandbox_write_file
            - sandbox_read_file
            - sandbox_list_files
            - sandbox_exec
            - http_request
            - delegate_to_agent
            - draft_action_plan
            - approve_action_plan
            - entity_search
            - onto_signals
            - onto_search
            - onto_aggregate
            - memory_store
            - memory_recall
          max_tool_rounds: 6
          max_iterations: 12
          context_injection: [signals]

        action:
          description: "Creating records, action items, notes, or mutations"
          keywords:
            - create action
            - draft plan
            - action plan
            - action item
            - follow-up
            - follow up
            - approve plan
            - assign
          tools:
            - http_request
            - draft_action_plan
            - approve_action_plan
            - entity_search
            - manager_review
            - sandbox_exec_python
            - onto_search
            - memory_store
          max_tool_rounds: 4
          max_iterations: 8
          context_injection: [signals]

      memory:
        namespace: remi-director
        auto_load: true
        auto_save: true
