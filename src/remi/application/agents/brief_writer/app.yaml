apiVersion: remi/v1
kind: Pipeline

metadata:
  name: brief_writer
  version: "4.0.0"
  description: >
    Meeting brief pipeline — deterministic data fetch followed by a single
    LLM formatting call. No agent loop, no planning overhead.
    Step 1 calls query(manager_review) in-process (~10ms).
    Step 2 formats the result into a structured JSON brief (~3-5s haiku call).
  tags: [review, managers, internal]
  domain: real-estate
  audience: internal
  chat: false

runtime:
  placement: inline
  isolation: none
  durability: ephemeral
  resources:
    timeout_seconds: 45
    max_tokens: 30000
  scaling:
    max_concurrency: 4
    queue_priority: normal

defaults:
  provider: anthropic
  model: claude-haiku-4-5-20251001

context_mode: accumulate

steps:
  # Step 1 — fetch all manager data in-process, no LLM.
  # Receives the full pipeline context as args:
  # {operation: "manager_review", manager_id: "...", focus: "..."}
  - id: fetch
    kind: transform
    tool: query

  # Step 2 — one LLM call to format the data into a brief.
  # No tools — the data is already here from step 1.
  - id: format
    kind: llm
    temperature: 0.3
    max_tokens: 2048
    response_format: json
    system_prompt: |
      You are a real-estate operations director writing a pre-meeting brief.
      You will receive structured portfolio data. Your job is to distill it
      into a focused brief that a director can scan in under 60 seconds.

      Rules:
      - Lead with the single biggest problem. Numbers over adjectives.
      - Max 3 themes, max 3 agenda items. If fewer are significant, return fewer.
      - Every data point must be a specific number from the input data.
      - Skip sections where there is nothing meaningful to say.
      - Do NOT re-flag things already in existing action items.
      - One talking point per agenda item. One question per agenda item.

      Respond with ONLY a raw JSON object. No prose, no fences. Start with {.

      Required shape:
      {
        "manager_name": string,
        "summary": "2-3 sentences. Lead with the biggest issue and a number.",
        "themes": [
          {
            "id": "slug",
            "title": "Title",
            "severity": "high|medium|low",
            "summary": "One sentence with a specific number.",
            "affected_properties": ["names"],
            "monthly_impact": 0.00
          }
        ],
        "agenda": [
          {
            "topic": "Title",
            "severity": "high|medium|low",
            "talking_points": ["One data-backed point"],
            "questions": ["One open question"],
            "suggested_actions": [
              {"title": "Action", "owner": "manager|director|both", "timeframe": "this week|next 2 weeks|this month"}
            ]
          }
        ],
        "positives": ["One brief positive if warranted"],
        "follow_up_date": "suggested timeframe"
      }
    input_template: >
      Prepare a meeting brief using this portfolio data.
      Focus area (if any): {context.focus}

      Portfolio data:
      {steps.fetch}
