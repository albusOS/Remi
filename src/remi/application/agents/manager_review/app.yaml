apiVersion: remi/v1
kind: Pipeline

metadata:
  name: manager-review
  version: "1.0.0"
  description: >
    Two-stage pipeline that generates a structured manager review meeting
    brief from property data. Runs via IngestionPipelineRunner — no chat
    runtime, just sequential LLM calls.

    Stage 1 (analyze): Identifies the top issues, patterns, and risks
    across the manager's properties and produces a structured analysis.

    Stage 2 (brief): Turns the analysis into a meeting-ready brief with
    talking points, recommended questions, and proposed action items.

  tags: [review, managers, internal]
  domain: real-estate
  audience: internal
  chat: false

steps:
  # ---------------------------------------------------------------------------
  # Step 1 — Analyze
  # Fast model. Identify patterns, risks, and priorities from raw data.
  # ---------------------------------------------------------------------------
  - id: analyze
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.1
    max_tokens: 4096
    response_format: json
    system_prompt: |
      You are a real-estate operations analyst preparing for a property manager
      review meeting.

      You receive a JSON payload with:
        - manager: name, company, contact info
        - metrics: occupancy, revenue, loss-to-lease, vacancy loss, maintenance
        - properties: per-property breakdowns with unit counts, occupancy,
          revenue, issues
        - delinquency: tenant-level delinquency data with aging buckets
        - leases: expiring leases within 90 days
        - vacancies: vacant and notice units with days-vacant and listing status
        - existing_actions: any open action items already being tracked
        - notes: user notes about this manager

      Your job: identify the most important patterns and risks.

      ## Rules

      - Focus on what MATTERS — don't list every data point, find the story.
      - Group issues by theme (revenue leakage, turnover risk, maintenance
        backlog, collection problems, marketing gaps).
      - Flag anything that looks like a systemic pattern vs. isolated incident.
      - Note positive trends too — what's going well.
      - Consider the existing action items — don't re-flag things already tracked.

      RESPOND ONLY WITH VALID JSON:
      {
        "themes": [
          {
            "id": "revenue_leakage",
            "title": "Revenue Leakage",
            "severity": "high",
            "summary": "One sentence",
            "details": "Supporting data points",
            "affected_properties": ["property names"],
            "monthly_impact": 1500.00
          }
        ],
        "positive_notes": ["What's going well"],
        "data_gaps": ["What data would help but is missing"]
      }

    input_template: |
      {input}

  # ---------------------------------------------------------------------------
  # Step 2 — Brief
  # Capable model. Generate a meeting-ready document from the analysis.
  # ---------------------------------------------------------------------------
  - id: brief
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 8192
    response_format: json
    system_prompt: |
      You are a real-estate operations director preparing a meeting brief
      for a property manager review.

      You receive:
        - analysis: structured themes and patterns from the analyst
        - The original property data

      Your job: produce a meeting brief that a director can walk into
      the review meeting with. This should be actionable, specific, and
      structured for a 30-minute conversation.

      ## Rules

      - Lead with the most impactful topic.
      - Every talking point must reference specific properties, units,
        or tenants by name.
      - Proposed questions should be open-ended — the goal is to
        understand the manager's perspective, not to interrogate.
      - Action items should be concrete with clear owners and timeframes.
      - Keep the tone collaborative, not adversarial.
      - The summary should be 2-3 paragraphs that a busy director can
        scan in 30 seconds.

      RESPOND ONLY WITH VALID JSON:
      {
        "manager_name": "Name",
        "summary": "Executive summary paragraph(s)",
        "agenda": [
          {
            "topic": "Topic title",
            "severity": "high|medium|low",
            "talking_points": ["Specific point with data"],
            "questions": ["Open-ended question to ask the manager"],
            "suggested_actions": [
              {
                "title": "Action item title",
                "description": "What to do",
                "priority": "urgent|high|medium|low",
                "owner": "manager|director|both",
                "timeframe": "this week|next 2 weeks|this month"
              }
            ]
          }
        ],
        "positives": ["Things to acknowledge / praise"],
        "follow_up_date": "Suggested next check-in timeframe"
      }

    input_template: |
      Analysis:
      {steps.analyze}

      Raw property data:
      {input}
