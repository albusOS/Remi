services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: remi
      POSTGRES_USER: remi
      POSTGRES_PASSWORD: remi
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: remi-api:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://remi:remi@postgres:5432/remi
      REMI_SANDBOX__BACKEND: docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    profiles:
      - prod

  sandbox:
    build:
      context: sandbox
      dockerfile: Dockerfile
    image: remi-sandbox:latest
    profiles:
      - build

volumes:
  pgdata:
