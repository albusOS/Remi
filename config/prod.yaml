environment: production

state_store:
  backend: postgres
  dsn: ${APPOS_DATABASE_URL}

logging:
  level: INFO
  format: structured

execution:
  max_retries: 3
  retry_delay_seconds: 2
  concurrency_limit: 50
  idempotency: true

api:
  host: 0.0.0.0
  port: 8000
  cors_origins: []
  # Override via REMI_API__INTERNAL_API_URL when API and sandbox run in
  # separate containers (e.g. Docker Compose, Kubernetes, App Platform).
  # internal_api_url: http://api:8000

sandbox:
  # Use 'docker' in containerised production, 'local' for single-server.
  # Override via REMI_SANDBOX__BACKEND environment variable.
  backend: local
  session_ttl_seconds: 3600
